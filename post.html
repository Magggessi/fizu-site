<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="theme-color" content="#0055a8">
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- OG tags — preenchidas dinamicamente via JS -->
<meta property="og:type" content="article">
<meta property="og:site_name" content="Fizu">
<meta property="og:title" id="og-title" content="Fizu — O que você diz, permanece.">
<meta property="og:description" id="og-desc" content="A rede social da verdade permanente.">
<meta property="og:image" id="og-img" content="https://fizu.com.br/og-image.png">
<meta property="og:url" id="og-url" content="https://fizu.com.br">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" id="tw-title" content="Fizu — O que você diz, permanece.">
<meta name="twitter:description" id="tw-desc" content="A rede social da verdade permanente.">
<meta name="twitter:image" id="tw-img" content="https://fizu.com.br/og-image.png">

<title id="page-title">Fizu — Carregando post...</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f7fc;--text:#0d1628;--text2:#1e3252;
  --aqua:#0055a8;--aqua-glow:rgba(0,85,168,0.2);--aqua-dim:rgba(0,85,168,0.08);
  --muted:#5a7090;--border:rgba(0,85,168,0.15);--card:#ffffff;
  --gold:#b87800;--coral:#cc3333;
}
html.dark{
  --bg:#080c14;--text:#eef4ff;--text2:#c8d8f0;
  --aqua:#3b9eff;--aqua-glow:rgba(59,158,255,0.3);--aqua-dim:rgba(59,158,255,0.09);
  --muted:#6b8aad;--border:rgba(59,158,255,0.13);--card:rgba(13,22,40,0.95);
  --gold:#f5c842;--coral:#ff6b6b;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.wrap{max-width:560px;width:100%}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
.logo-box{width:40px;height:40px;border-radius:11px;background:linear-gradient(135deg,#3b9eff,#7c3aed,#ff2e88);display:flex;align-items:center;justify-content:center}
.logo-box svg{width:26px;height:26px}
.fizu-brand{font-weight:900;font-size:1.4rem;letter-spacing:.06em}
html.dark .fizu-brand{color:#fff}
html:not(.dark) .fizu-brand{color:#0055a8}

.post-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,0.12);position:relative;overflow:hidden}
.post-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#3b9eff,#7c3aed)}
.post-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.post-av{width:44px;height:44px;border-radius:50%;background:var(--aqua-dim);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:var(--aqua);flex-shrink:0;overflow:hidden;position:relative}
.post-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.post-nome{font-size:.95rem;font-weight:800;color:var(--text)}
.post-tempo{font-size:.75rem;color:var(--muted);margin-top:2px}
.eternal-pill{font-size:.65rem;font-weight:700;color:var(--aqua);border:1px solid var(--border);padding:3px 9px;border-radius:10px;margin-left:auto;white-space:nowrap}
.post-body{font-size:1rem;line-height:1.75;color:var(--text);word-break:break-word;white-space:pre-wrap}
.post-img{margin-top:14px;border-radius:12px;overflow:hidden;max-height:400px}
.post-img img{width:100%;object-fit:cover;display:block}
.post-stats{display:flex;gap:20px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);font-size:.82rem;color:var(--muted)}
.post-stat span{color:var(--text);font-weight:700}

.cta-box{margin-top:20px;text-align:center}
.btn-feed{display:inline-block;background:var(--aqua);color:#fff;padding:13px 32px;border-radius:12px;font-weight:700;font-size:.95rem;text-decoration:none;box-shadow:0 4px 20px var(--aqua-glow);transition:all .25s}
.btn-feed:hover{opacity:.88;transform:translateY(-1px)}
.btn-sec{display:inline-block;color:var(--muted);font-size:.85rem;text-decoration:none;margin-top:10px;border:1px solid var(--border);padding:9px 20px;border-radius:10px;transition:all .25s}
.btn-sec:hover{border-color:var(--aqua);color:var(--aqua)}

.loading{text-align:center;padding:48px 24px;color:var(--muted)}
.loading-pulse{width:48px;height:48px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--aqua);animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .4s ease forwards}

.not-found{text-align:center;padding:48px 24px}
.not-found-emoji{font-size:3rem;margin-bottom:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <div class="logo-box">
      <svg viewBox="0 0 100 100" fill="none">
        <g transform="rotate(-12 50 50)">
          <ellipse cx="55" cy="50" rx="26" ry="17" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
          <polygon points="25,50 5,35 10,50 5,65" fill="none" stroke="white" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
          <circle cx="68" cy="45" r="5" fill="white"/>
        </g>
      </svg>
    </div>
    <span class="fizu-brand">FIZU</span>
  </div>

  <div id="conteudo">
    <div class="loading">
      <div class="loading-pulse"></div>
      <div>Carregando post...</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
  const saved = localStorage.getItem('fizu-theme');
  const sys = window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (saved ? saved !== 'dark' : !sys) document.documentElement.classList.remove('dark');
})();

const SUPA_URL = 'https://tnwildfshzrvktrlfjhz.supabase.co';
const SUPA_KEY = 'sb_publishable_wGUZQpVa2MWcpC2gupBC4Q_JrtWFeKN';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

function getPostId() {
  // Suporta /post/[id] via query string injetada pelo netlify redirect
  const params = new URLSearchParams(window.location.search);
  if (params.get('id')) return params.get('id');
  // Suporta hash #post-[id]
  const hash = window.location.hash;
  if (hash.startsWith('#')) return hash.slice(1);
  // Suporta pathname /post/[id]
  const parts = window.location.pathname.split('/');
  return parts[parts.length - 1] || null;
}

function formatTempo(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
}

function escapeHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function carregarPost() {
  const postId = getPostId();
  const el = document.getElementById('conteudo');

  if (!postId || postId.length < 10) {
    el.innerHTML = `<div class="not-found"><div class="not-found-emoji">🐟</div><div style="font-weight:700;font-size:1.1rem;margin-bottom:8px">Post não encontrado</div><div style="color:var(--muted);font-size:.88rem;margin-bottom:24px">O link pode estar incompleto ou expirado.</div><a href="feed.html" class="btn-feed">Ver o feed →</a></div>`;
    return;
  }

  try {
    const [postRes, ] = await Promise.all([
      sb.from('posts').select('*').eq('id', postId).single()
    ]);
    const post = postRes.data;

    if (!post || post.status === 'removido') {
      el.innerHTML = `<div class="not-found"><div class="not-found-emoji">🚫</div><div style="font-weight:700;font-size:1.1rem;margin-bottom:8px">Post removido</div><div style="color:var(--muted);font-size:.88rem;margin-bottom:24px">Este conteúdo foi removido.</div><a href="feed.html" class="btn-feed">Ver o feed →</a></div>`;
      return;
    }

    const { data: perfil } = await sb.from('perfis').select('nome, foto_url, biografia').eq('id', post.autor_id).single();
    const nome = perfil?.nome || 'Usuário Fizu';
    const ini = nome.charAt(0).toUpperCase();
    const foto = perfil?.foto_url;
    const conteudo = post.conteudo || '';
    const previewOG = conteudo.substring(0, 200).replace(/\n/g, ' ');
    const tempo = formatTempo(post.criado_em);
    const feedUrl = `https://fizu.com.br/feed.html#post-${post.id}`;
    const postUrl = `https://fizu.com.br/post/${post.id}`;

    // Atualiza OG tags para bots de scraping
    const setMeta = (sel, val) => { const el = document.querySelector(sel); if (el) el.setAttribute('content', val); };
    const titulo = `${nome}: "${previewOG.substring(0, 80)}${previewOG.length > 80 ? '…' : ''}"`;
    setMeta('#og-title', titulo);
    setMeta('#og-desc', `${previewOG} — No Fizu, o que você diz fica para sempre. 🐟`);
    setMeta('#og-url', postUrl);
    setMeta('#tw-title', titulo);
    setMeta('#tw-desc', `${previewOG.substring(0, 120)} — Fizu`);
    if (post.midia_url) { setMeta('#og-img', post.midia_url); setMeta('#tw-img', post.midia_url); }
    document.getElementById('page-title').textContent = `${nome} no Fizu`;

    // Monta HTML do post
    const fotoHtml = foto
      ? `<div class="post-av"><img src="${foto}" alt="${escapeHtml(ini)}" onerror="this.style.display='none'"></div>`
      : `<div class="post-av">${ini}</div>`;

    const midiaHtml = post.midia_url
      ? `<div class="post-img"><img src="${escapeHtml(post.midia_url)}" alt="Mídia do post" loading="lazy"></div>`
      : '';

    el.innerHTML = `
      <div class="post-card fade-in">
        <div class="post-header">
          ${fotoHtml}
          <div>
            <div class="post-nome">${escapeHtml(nome)}</div>
            <div class="post-tempo">${tempo}</div>
          </div>
          <div class="eternal-pill">⚓ eterno</div>
        </div>
        <div class="post-body">${escapeHtml(conteudo)}</div>
        ${midiaHtml}
        <div class="post-stats">
          <div>❤️ <span>${post.curtidas_count || 0}</span></div>
          <div>💬 <span>${post.comentarios_count || 0}</span></div>
        </div>
      </div>
      <div class="cta-box">
        <a href="${feedUrl}" class="btn-feed">🐟 Ver e comentar no Fizu</a>
        <br>
        <a href="index.html" class="btn-sec">O que é o Fizu?</a>
      </div>`;

  } catch(e) {
    el.innerHTML = `<div class="not-found"><div class="not-found-emoji">🐟</div><div style="font-weight:700;margin-bottom:8px">Erro ao carregar post</div><a href="feed.html" class="btn-feed">Ver o feed →</a></div>`;
  }
}

carregarPost();
</script>
</body>
</html>
