<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d10">
<title>Anúncio — Fizu Marketplace</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root{
    --bg:#0d0d10; --card:#16161c; --card2:#1d1d25; --borda:#2a2a35;
    --ouro:#d4a017; --ouro-claro:#f0c04a; --ouro-escuro:#8a6a10;
    --texto:#f2f0ea; --texto2:#9b98a5; --verde:#10b981; --vermelho:#ef4444;
    --raio:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--texto);font:16px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding-bottom:96px}

  /* ===== TOPO ===== */
  header{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(13,13,16,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--borda)}
  .btn-voltar{width:38px;height:38px;border-radius:50%;border:1px solid var(--borda);background:var(--card);color:var(--texto);font-size:18px;cursor:pointer;flex-shrink:0}
  header h1{font-size:15px;font-weight:600;color:var(--texto2);letter-spacing:.4px}
  header h1 b{color:var(--ouro)}
  .btn-share{margin-left:auto;width:38px;height:38px;border-radius:50%;border:1px solid var(--borda);background:var(--card);color:var(--texto);font-size:16px;cursor:pointer;flex-shrink:0}

  /* ===== GALERIA ===== */
  .galeria{position:relative;background:#000}
  .galeria-principal{width:100%;aspect-ratio:4/3;object-fit:contain;background:#000;display:block}
  .galeria-thumbs{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
  .galeria-thumbs::-webkit-scrollbar{display:none}
  .thumb{width:64px;height:64px;border-radius:10px;object-fit:cover;border:2px solid transparent;cursor:pointer;flex-shrink:0;opacity:.55;transition:.2s}
  .thumb.ativa{border-color:var(--ouro);opacity:1}
  .badge-origem{position:absolute;top:12px;left:12px;background:rgba(13,13,16,.85);border:1px solid var(--ouro-escuro);color:var(--ouro-claro);font-size:11px;font-weight:600;padding:5px 10px;border-radius:20px;letter-spacing:.3px}
  .badge-destaque{position:absolute;top:12px;right:12px;background:linear-gradient(135deg,var(--ouro),var(--ouro-claro));color:#1a1300;font-size:11px;font-weight:700;padding:5px 10px;border-radius:20px}

  /* ===== CONTEÚDO ===== */
  main{padding:18px 16px;max-width:680px;margin:0 auto}
  .preco{font-size:30px;font-weight:800;color:var(--ouro-claro);letter-spacing:-.5px}
  .preco small{font-size:15px;font-weight:600;color:var(--texto2);margin-left:8px}
  .titulo{font-size:20px;font-weight:600;margin:6px 0 10px;line-height:1.3}
  .meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
  .chip{font-size:12.5px;color:var(--texto2);background:var(--card);border:1px solid var(--borda);padding:5px 12px;border-radius:20px}
  .chip b{color:var(--texto)}

  section{background:var(--card);border:1px solid var(--borda);border-radius:var(--raio);padding:16px;margin-bottom:14px}
  section h2{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--ouro);margin-bottom:10px}
  .descricao{color:var(--texto);white-space:pre-wrap;font-size:15px}
  .link-origem{display:inline-block;margin-top:10px;color:var(--ouro-claro);font-size:13px;text-decoration:none;border-bottom:1px dashed var(--ouro-escuro)}

  /* ===== VENDEDOR ===== */
  .vendedor{display:flex;align-items:center;gap:12px}
  .vendedor img{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--ouro-escuro)}
  .vendedor .avatar-fallback{width:52px;height:52px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--ouro);border:2px solid var(--ouro-escuro)}
  .vendedor-info{flex:1;min-width:0}
  .vendedor-info .nome{font-weight:600;font-size:15px}
  .vendedor-info .desde{font-size:12.5px;color:var(--texto2)}
  .btn-perfil{font-size:13px;color:var(--ouro-claro);background:none;border:1px solid var(--ouro-escuro);border-radius:20px;padding:7px 14px;cursor:pointer}

  /* ===== BARRA DE AÇÕES ===== */
  .acoes{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;gap:10px;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:rgba(13,13,16,.94);backdrop-filter:blur(12px);border-top:1px solid var(--borda)}
  .btn-fav{width:52px;height:52px;border-radius:14px;border:1px solid var(--borda);background:var(--card);color:var(--texto2);font-size:22px;cursor:pointer;flex-shrink:0;transition:.2s}
  .btn-fav.ativo{color:var(--ouro-claro);border-color:var(--ouro-escuro);background:rgba(212,160,23,.1)}
  .btn-chat{flex:1;height:52px;border-radius:14px;border:1px solid var(--ouro-escuro);background:var(--card);color:var(--ouro-claro);font-size:15px;font-weight:700;cursor:pointer}
  .btn-proposta{flex:1;height:52px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--ouro),var(--ouro-claro));color:#1a1300;font-size:15px;font-weight:800;cursor:pointer}
  .btn-proposta:active,.btn-chat:active{transform:scale(.97)}

  /* ===== MODAL PROPOSTA ===== */
  .modal-overlay{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{width:100%;max-width:680px;background:var(--card2);border-radius:22px 22px 0 0;padding:22px 20px calc(22px + env(safe-area-inset-bottom));animation:sobe .25s ease}
  @keyframes sobe{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal h3{font-size:17px;margin-bottom:16px}
  .modal label{display:block;font-size:12.5px;color:var(--texto2);margin:12px 0 6px}
  .modal input,.modal textarea,.modal select{width:100%;background:var(--bg);border:1px solid var(--borda);border-radius:10px;color:var(--texto);padding:12px;font-size:15px;font-family:inherit}
  .modal input:focus,.modal textarea:focus,.modal select:focus{outline:none;border-color:var(--ouro-escuro)}
  .modal textarea{min-height:80px;resize:vertical}
  .modal-botoes{display:flex;gap:10px;margin-top:20px}
  .btn-cancelar{flex:1;height:48px;border-radius:12px;border:1px solid var(--borda);background:none;color:var(--texto2);font-size:15px;cursor:pointer}
  .btn-enviar{flex:2;height:48px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--ouro),var(--ouro-claro));color:#1a1300;font-size:15px;font-weight:800;cursor:pointer}
  .btn-enviar:disabled{opacity:.5}

  /* ===== ESTADOS ===== */
  .estado{display:none;text-align:center;padding:70px 24px;color:var(--texto2)}
  .estado.open{display:block}
  .estado .icone{font-size:44px;margin-bottom:14px}
  .estado h2{font-size:17px;color:var(--texto);margin-bottom:8px;text-transform:none;letter-spacing:0}
  .estado a{color:var(--ouro-claro)}
  #conteudo{display:none}
  #conteudo.open{display:block}
  .spinner{width:34px;height:34px;border:3px solid var(--borda);border-top-color:var(--ouro);border-radius:50%;margin:0 auto 14px;animation:gira .8s linear infinite}
  @keyframes gira{to{transform:rotate(360deg)}}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);z-index:50;background:var(--card2);border:1px solid var(--ouro-escuro);color:var(--texto);padding:12px 20px;border-radius:12px;font-size:14px;opacity:0;pointer-events:none;transition:.25s;max-width:90vw;text-align:center}
  .toast.open{opacity:1;transform:translateX(-50%) translateY(0)}
  .vendido-tag{display:inline-block;background:var(--vermelho);color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:8px}

  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header>
  <button class="btn-voltar" id="btnVoltar" aria-label="Voltar">←</button>
  <h1><b>Fizu</b> Marketplace</h1>
  <button class="btn-share" id="btnShare" aria-label="Compartilhar">⇪</button>
</header>

<!-- Estado: carregando -->
<div class="estado open" id="estadoCarregando">
  <div class="spinner"></div>
  <p>Carregando anúncio…</p>
</div>

<!-- Estado: erro / não encontrado -->
<div class="estado" id="estadoErro">
  <div class="icone">🪙</div>
  <h2>Anúncio não encontrado</h2>
  <p>Ele pode ter sido encerrado pelo vendedor.<br><a href="feed.html">Voltar ao Fizu</a></p>
</div>

<!-- Conteúdo -->
<div id="conteudo">
  <div class="galeria">
    <img class="galeria-principal" id="imgPrincipal" alt="Foto do anúncio">
    <span class="badge-origem" id="badgeOrigem"></span>
    <span class="badge-destaque" id="badgeDestaque">★ Destaque</span>
  </div>
  <div class="galeria-thumbs" id="thumbs"></div>

  <main>
    <span class="vendido-tag" id="tagVendido">VENDIDO</span>
    <div class="preco" id="preco"></div>
    <h1 class="titulo" id="titulo"></h1>
    <div class="meta" id="meta"></div>

    <section>
      <h2>Descrição</h2>
      <p class="descricao" id="descricao"></p>
      <a class="link-origem" id="linkOrigem" target="_blank" rel="noopener">Ver anúncio original ↗</a>
    </section>

    <section>
      <h2>Vendedor</h2>
      <div class="vendedor">
        <span id="avatarWrap"></span>
        <div class="vendedor-info">
          <div class="nome" id="vendedorNome"></div>
          <div class="desde" id="anuncioData"></div>
        </div>
        <button class="btn-perfil" id="btnPerfil">Ver perfil</button>
      </div>
    </section>
  </main>
</div>

<!-- Barra de ações -->
<div class="acoes" id="barraAcoes" style="display:none">
  <button class="btn-fav" id="btnFav" aria-label="Favoritar">♡</button>
  <button class="btn-chat" id="btnChat">💬 Chat</button>
  <button class="btn-proposta" id="btnProposta">Fazer proposta</button>
</div>

<!-- Modal de proposta -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>💰 Fazer proposta</h3>
    <label for="propValor">Valor da proposta (R$)</label>
    <input type="number" id="propValor" inputmode="decimal" min="1" step="0.01" placeholder="0,00">
    <label for="propValidade">Validade</label>
    <select id="propValidade">
      <option value="24h">24 horas</option>
      <option value="48h" selected>48 horas</option>
      <option value="7d">7 dias</option>
    </select>
    <label for="propMensagem">Mensagem (opcional)</label>
    <textarea id="propMensagem" placeholder="Ex.: Posso buscar hoje à tarde."></textarea>
    <div class="modal-botoes">
      <button class="btn-cancelar" id="btnCancelarProposta">Cancelar</button>
      <button class="btn-enviar" id="btnEnviarProposta">Enviar proposta</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   FIZU — Página de detalhe do anúncio (Marketplace)
   Regras da casa: sem FK joins (duas queries com .in),
   try/catch sempre, visibilidade via classList.
   ============================================================ */
const SUPABASE_URL = 'https://tnwildfshzrvktrlfjhz.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_wGUZQpVa2MWcpC2gupBC4Q_JrtWFeKN';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = (id) => document.getElementById(id);
let listing = null, vendedor = null, imagens = [], usuario = null, favId = null;

function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('open');
  setTimeout(() => t.classList.remove('open'), 2600);
}

function formatarPreco(v){
  return Number(v).toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
}

function formatarData(iso){
  try{
    return new Date(iso).toLocaleDateString('pt-BR', { day:'numeric', month:'long', year:'numeric' });
  }catch{ return ''; }
}

async function init(){
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  if(!id){ mostrarErro(); return; }

  try{
    // Sessão (não bloqueia a página)
    try{
      const { data } = await sb.auth.getSession();
      usuario = data?.session?.user || null;
    }catch{ usuario = null; }

    // 1) Anúncio
    const { data: l, error: errL } = await sb.from('marketplace_listings')
      .select('*').eq('id', id).maybeSingle();
    if(errL || !l){ mostrarErro(); return; }
    listing = l;

    // 2) Queries paralelas e independentes (nunca FK join)
    const [imgsRes, perfilRes, catRes] = await Promise.all([
      sb.from('marketplace_imagens').select('url, ordem').eq('listing_id', id).order('ordem', { ascending:true }),
      sb.from('perfis').select('id, nome, foto_url').eq('id', l.user_id).maybeSingle(),
      l.categoria_id
        ? sb.from('marketplace_categorias').select('nome, icone').eq('id', l.categoria_id).maybeSingle()
        : Promise.resolve({ data:null })
    ]);
    imagens  = imgsRes?.data || [];
    vendedor = perfilRes?.data || null;
    const categoria = catRes?.data || null;

    renderizar(categoria);

    // 3) Favorito do usuário logado
    if(usuario){
      try{
        const { data: fav } = await sb.from('marketplace_favoritos')
          .select('id').eq('listing_id', id).eq('user_id', usuario.id).maybeSingle();
        if(fav){ favId = fav.id; atualizarBotaoFav(true); }
      }catch{}
    }

    // 4) Contador de visualizações (best effort — RLS pode bloquear, ignorar)
    try{
      await sb.from('marketplace_listings')
        .update({ visualizacoes: (l.visualizacoes || 0) + 1 }).eq('id', id);
    }catch{}
  }catch(e){
    console.error('init:', e);
    mostrarErro();
  }
}

function mostrarErro(){
  $('estadoCarregando').classList.remove('open');
  $('estadoErro').classList.add('open');
}

function renderizar(categoria){
  document.title = `${listing.titulo} — Fizu Marketplace`;

  // Galeria
  const fallbackImg = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600"><rect fill="#16161c" width="800" height="600"/><text x="400" y="310" font-size="60" text-anchor="middle" fill="#d4a017">🪙</text></svg>'
  );
  const urls = imagens.length ? imagens.map(i => i.url) : [fallbackImg];
  $('imgPrincipal').src = urls[0];
  const thumbsEl = $('thumbs');
  thumbsEl.innerHTML = '';
  if(urls.length > 1){
    urls.forEach((u, i) => {
      const t = document.createElement('img');
      t.src = u; t.className = 'thumb' + (i === 0 ? ' ativa' : ''); t.alt = `Foto ${i+1}`;
      t.addEventListener('click', () => {
        $('imgPrincipal').src = u;
        thumbsEl.querySelectorAll('.thumb').forEach(x => x.classList.remove('ativa'));
        t.classList.add('ativa');
      });
      thumbsEl.appendChild(t);
    });
  }

  // Badges
  if(listing.origem_plataforma){
    $('badgeOrigem').textContent = '↗ Importado: ' + listing.origem_plataforma;
  } else {
    $('badgeOrigem').remove();
  }
  if(!listing.destaque) $('badgeDestaque').remove();

  // Preço / status
  if(listing.preco_negociar || listing.preco == null){
    $('preco').innerHTML = 'A negociar <small>aceita propostas</small>';
  } else {
    $('preco').innerHTML = formatarPreco(listing.preco) +
      (listing.preco_negociar === false ? '' : ' <small>ou proposta</small>');
  }
  if(listing.status !== 'vendido') $('tagVendido').remove();

  $('titulo').textContent = listing.titulo || 'Sem título';

  // Chips
  const meta = $('meta');
  const chips = [];
  if(categoria) chips.push(`${categoria.icone || '🏷️'} <b>${categoria.nome}</b>`);
  if(listing.condicao) chips.push(`Condição: <b>${listing.condicao}</b>`);
  if(listing.localizacao) chips.push(`📍 <b>${listing.localizacao}</b>`);
  if(listing.visualizacoes != null) chips.push(`👁 ${listing.visualizacoes} visualizações`);
  meta.innerHTML = chips.map(c => `<span class="chip">${c}</span>`).join('');

  // Descrição
  $('descricao').textContent = listing.descricao || 'Sem descrição.';
  if(listing.origem_url){
    $('linkOrigem').href = listing.origem_url;
  } else {
    $('linkOrigem').remove();
  }

  // Vendedor
  const nome = vendedor?.nome || 'Vendedor Fizu';
  $('vendedorNome').textContent = nome;
  $('anuncioData').textContent = 'Anunciado em ' + formatarData(listing.criado_em);
  const wrap = $('avatarWrap');
  if(vendedor?.foto_url){
    wrap.innerHTML = `<img src="${vendedor.foto_url}" alt="${nome}">`;
  } else {
    wrap.innerHTML = `<span class="avatar-fallback">${nome.charAt(0).toUpperCase()}</span>`;
  }

  // Dono do anúncio não vê botões de compra
  if(usuario && usuario.id === listing.user_id){
    $('btnChat').textContent = '📊 Meu anúncio';
    $('btnProposta').textContent = 'Editar no Fizu';
  }

  $('estadoCarregando').classList.remove('open');
  $('conteudo').classList.add('open');
  $('barraAcoes').style.display = 'flex';
}

/* ===== Favoritar ===== */
function atualizarBotaoFav(ativo){
  const b = $('btnFav');
  b.textContent = ativo ? '♥' : '♡';
  b.classList.toggle('ativo', ativo);
}

$('btnFav').addEventListener('click', async () => {
  if(!usuario){ toast('Entre no Fizu para favoritar'); return; }
  try{
    if(favId){
      await sb.from('marketplace_favoritos').delete().eq('id', favId);
      favId = null;
      atualizarBotaoFav(false);
      toast('Removido dos favoritos');
    } else {
      const { data, error } = await sb.from('marketplace_favoritos')
        .insert({ user_id: usuario.id, listing_id: listing.id }).select('id').single();
      if(error) throw error;
      favId = data.id;
      atualizarBotaoFav(true);
      toast('Salvo nos favoritos 🪙');
    }
  }catch(e){
    console.error('fav:', e);
    toast('Não foi possível atualizar o favorito');
  }
});

/* ===== Chat: busca conversa nas DUAS direções antes de criar ===== */
async function obterConversa(outroId){
  const meuId = usuario.id;
  try{
    const { data: existente } = await sb.from('conversas')
      .select('id')
      .or(`and(usuario1_id.eq.${meuId},usuario2_id.eq.${outroId}),and(usuario1_id.eq.${outroId},usuario2_id.eq.${meuId})`)
      .maybeSingle();
    if(existente) return existente.id;

    const { data: nova, error } = await sb.from('conversas')
      .insert({ usuario1_id: meuId, usuario2_id: outroId }).select('id').single();
    if(error){
      // 23505 = índice único pegou uma corrida; rebusca
      if(String(error.code) === '23505'){
        const { data: retry } = await sb.from('conversas')
          .select('id')
          .or(`and(usuario1_id.eq.${meuId},usuario2_id.eq.${outroId}),and(usuario1_id.eq.${outroId},usuario2_id.eq.${meuId})`)
          .maybeSingle();
        if(retry) return retry.id;
      }
      throw error;
    }
    return nova.id;
  }catch(e){
    console.error('conversa:', e);
    return null;
  }
}

$('btnChat').addEventListener('click', async () => {
  if(usuario && usuario.id === listing.user_id){
    location.href = 'feed.html#marketplace';
    return;
  }
  if(!usuario){ toast('Entre no Fizu para conversar com o vendedor'); return; }
  const conversaId = await obterConversa(listing.user_id);
  if(conversaId){
    location.href = `feed.html#chat=${conversaId}`;
  } else {
    toast('Não foi possível abrir o chat agora');
  }
});

/* ===== Proposta ===== */
$('btnProposta').addEventListener('click', () => {
  if(usuario && usuario.id === listing.user_id){
    location.href = 'feed.html#marketplace';
    return;
  }
  if(!usuario){ toast('Entre no Fizu para fazer uma proposta'); return; }
  if(listing.status === 'vendido'){ toast('Este anúncio já foi vendido'); return; }
  if(listing.preco && !listing.preco_negociar) $('propValor').value = listing.preco;
  $('modalOverlay').classList.add('open');
});

$('btnCancelarProposta').addEventListener('click', () => $('modalOverlay').classList.remove('open'));
$('modalOverlay').addEventListener('click', (e) => {
  if(e.target === $('modalOverlay')) $('modalOverlay').classList.remove('open');
});

$('btnEnviarProposta').addEventListener('click', async () => {
  const valor = parseFloat($('propValor').value);
  if(!valor || valor <= 0){ toast('Informe um valor válido'); return; }
  const btn = $('btnEnviarProposta');
  btn.disabled = true;
  try{
    const conversaId = await obterConversa(listing.user_id);
    const { error } = await sb.from('propostas').insert({
      listing_id: listing.id,
      comprador_id: usuario.id,
      vendedor_id: listing.user_id,
      valor,
      validade: $('propValidade').value,
      mensagem: $('propMensagem').value.trim() || null,
      status: 'pendente',
      conversa_id: conversaId
    });
    if(error) throw error;

    // Notifica o vendedor pela conversa (best effort)
    if(conversaId){
      try{
        await sb.from('mensagens').insert({
          conversa_id: conversaId,
          autor_id: usuario.id,
          conteudo: `💰 Proposta enviada: ${formatarPreco(valor)} por "${listing.titulo}"`
        });
        await sb.from('conversas')
          .update({ ultima_mensagem_em: new Date().toISOString() }).eq('id', conversaId);
      }catch{}
    }

    $('modalOverlay').classList.remove('open');
    toast('Proposta enviada ao vendedor ✅');
  }catch(e){
    console.error('proposta:', e);
    toast('Não foi possível enviar a proposta');
  }finally{
    btn.disabled = false;
  }
});

/* ===== Navegação / share ===== */
$('btnVoltar').addEventListener('click', () => {
  if(history.length > 1) history.back();
  else location.href = 'feed.html#marketplace';
});

$('btnPerfil').addEventListener('click', () => {
  if(vendedor) location.href = `feed.html#perfil=${vendedor.id}`;
});

$('btnShare').addEventListener('click', async () => {
  const url = location.href;
  try{
    if(navigator.share){
      await navigator.share({ title: listing?.titulo || 'Anúncio no Fizu', url });
    } else {
      await navigator.clipboard.writeText(url);
      toast('Link copiado 🔗');
    }
  }catch{}
});

init();
</script>
</body>
</html>
